name: smoke
# Backstop for the publish path: the private-side tripwire gates what gets
# pushed here, but nothing used to re-verify the published tree itself.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sh test/smoke.sh
